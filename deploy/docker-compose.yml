services:
  mysql:
    image: mysql:8.4
    container_name: campusshare-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    container_name: campusshare-redis
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"${REDIS_PASSWORD}\" ]; then
      redis-server --appendonly yes --requirepass ${REDIS_PASSWORD};
      else
      redis-server --appendonly yes;
      fi"
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: campusshare-app
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      DATASOURCE_USERNAME: root
      DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_SQL_INIT_MODE: ${SPRING_SQL_INIT_MODE}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE}
      REGISTER_CODE_MAIL_FROM: ${REGISTER_CODE_MAIL_FROM}
      REGISTER_CODE_LOG_ENABLED: ${REGISTER_CODE_LOG_ENABLED}
      MATERIAL_STORAGE_ROOT: ${MATERIAL_STORAGE_ROOT}
    ports:
      - "${APP_PORT}:8080"
    volumes:
      - material_files:${MATERIAL_STORAGE_ROOT}

volumes:
  mysql_data:
  redis_data:
  material_files:
