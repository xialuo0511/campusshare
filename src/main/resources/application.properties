server.port=${SERVER_PORT:8080}

spring.application.name=campusshare
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/campusshare?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.username=${DATASOURCE_USERNAME:root}
spring.datasource.password=${DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.xialuo.campusshare.entity

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:3000ms}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:30MB}
