server.port=${SERVER_PORT:8080}

spring.application.name=campusshare
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/campusshare?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.username=${DATASOURCE_USERNAME:root}
spring.datasource.password=${DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.xialuo.campusshare.entity

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:3000ms}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:30MB}

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:sql/001_init_user_info.sql,classpath:sql/002_init_product_order.sql,classpath:sql/003_init_material_report_notification.sql,classpath:sql/004_init_comment_info.sql,classpath:sql/005_init_point_ledger.sql,classpath:sql/006_init_team_recruitment.sql,classpath:sql/007_init_favorite_info.sql,classpath:sql/008_init_product_publish_extension.sql,classpath:sql/009_init_seller_verification.sql,classpath:sql/010_init_favorite_resource_type.sql,classpath:sql/011_init_system_rule_config.sql,classpath:sql/012_init_audit_log.sql,classpath:sql/013_init_notification_mail_task.sql,classpath:sql/014_init_user_avatar_review.sql
spring.sql.init.continue-on-error=${SPRING_SQL_INIT_CONTINUE_ON_ERROR:true}

logging.level.com.xialuo.campusshare=INFO

campusshare.mail.register.from=${REGISTER_CODE_MAIL_FROM:noreply@campusshare.local}
campusshare.mail.register.log-code-enabled=${REGISTER_CODE_LOG_ENABLED:true}
campusshare.mail.dispatch.from=${MAIL_DISPATCH_FROM:noreply@campusshare.local}
campusshare.mail.dispatch.enabled=${MAIL_DISPATCH_ENABLED:true}
campusshare.mail.dispatch.scheduler.enabled=${MAIL_DISPATCH_SCHEDULER_ENABLED:true}
campusshare.mail.dispatch.fixed-delay-ms=${MAIL_DISPATCH_FIXED_DELAY_MS:60000}
campusshare.order.scheduler.enabled=${ORDER_SCHEDULER_ENABLED:true}
campusshare.order.scheduler.fixed-delay-ms=${ORDER_SCHEDULER_FIXED_DELAY_MS:60000}
campusshare.rule.bootstrap.enabled=${RULE_BOOTSTRAP_ENABLED:true}
