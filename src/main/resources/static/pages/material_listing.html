<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>学术资源 | CampusShare</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: "Inter", sans-serif; }
        h1, h2, h3 { font-family: "Manrope", sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface">
<header class="bg-[#f8f9fa] dark:bg-slate-950 docked full-width top-0 z-50">
    <div class="flex justify-between items-center w-full px-6 py-3 max-w-[1440px] mx-auto">
        <div class="flex items-center gap-8">
            <span class="text-2xl font-bold tracking-tighter text-[#005d90] dark:text-sky-500">CampusShare</span>
            <nav class="hidden md:flex gap-6 font-['Manrope'] text-sm tracking-wide">
                <a class="text-slate-600 dark:text-slate-400 font-medium hover:text-[#005d90] transition-colors" data-nav-target="/pages/market_listing.html" href="#">交易市场</a>
                <a class="text-[#005d90] dark:text-sky-400 font-bold border-b-2 border-[#005d90] pb-1" data-nav-target="/pages/market_listing.html?view=MATERIAL" href="#">学术资源</a>
                <a class="text-slate-600 dark:text-slate-400 font-medium hover:text-[#005d90] transition-colors" data-nav-target="/pages/market_listing.html?view=FORUM" href="#">校园论坛</a>
            </nav>
        </div>
        <div class="flex items-center gap-3">
            <button class="material-symbols-outlined text-slate-600 hover:text-primary transition-colors">notifications</button>
            <button class="material-symbols-outlined text-slate-600 hover:text-primary transition-colors">account_circle</button>
            <button class="bg-primary text-on-primary px-5 py-2 rounded-lg text-sm font-semibold scale-95 active:scale-100 duration-150" data-nav-target="/pages/publish_create.html?type=material">发布</button>
        </div>
    </div>
</header>

<script>
    (function RedirectLegacyMaterialListingPage() {
        const searchParams = new URLSearchParams(window.location.search || "");
        searchParams.set("view", "MATERIAL");
        window.location.replace(`/pages/market_listing.html?${searchParams.toString()}`);
    })();
</script>
<main class="max-w-[1440px] mx-auto px-6 py-8">
    <section class="mb-6">
        <h1 class="text-3xl font-bold text-on-surface mb-2">学术资源广场</h1>
        <p class="text-sm text-on-surface-variant" data-role="summary-text">显示 0 份公开资料</p>
    </section>

    <section class="bg-surface-container-low p-4 rounded-xl border border-outline-variant/20 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
            <div class="md:col-span-2 relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
                <input class="w-full pl-10 pr-3 py-2 bg-surface-container-lowest rounded-lg border border-outline-variant/20 text-sm" data-role="keyword-input" placeholder="搜索课程名、描述关键字，按回车搜索" type="text"/>
            </div>
            <select class="w-full bg-surface-container-lowest rounded-lg text-sm" data-role="tag-select">
                <option value="">全部标签</option>
            </select>
            <button class="px-4 py-2 rounded-lg bg-surface-container-high text-on-surface text-sm font-semibold hover:bg-surface-container-highest" data-role="reset-filter" type="button">重置筛选</button>
        </div>
    </section>

    <section class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5" data-role="material-grid"></section>

    <section class="mt-8 flex flex-col items-center gap-2">
        <div class="flex items-center gap-2" data-role="pager">
            <button class="px-3 py-1.5 rounded-md bg-surface-container text-on-surface text-sm" data-page-action="prev" type="button">上一页</button>
            <span class="text-sm text-on-surface-variant min-w-24 text-center" data-role="pager-text">第 1 / 1 页</span>
            <button class="px-3 py-1.5 rounded-md bg-surface-container text-on-surface text-sm" data-page-action="next" type="button">下一页</button>
        </div>
    </section>
</main>

<script src="/pages/assets/js/campusshare-api.js"></script>
<script src="/pages/assets/js/material-listing.js"></script>
</body>
</html>
