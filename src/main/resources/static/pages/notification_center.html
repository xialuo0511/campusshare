<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusShare - 消息中心</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="min-h-screen bg-surface text-on-surface">
<header class="sticky top-0 z-50 border-b border-slate-200 bg-slate-50">
    <div class="flex h-16 items-center justify-between px-8">
        <div class="flex items-center gap-8">
            <a href="/pages/market_overview.html" data-nav-target="/pages/market_overview.html" class="text-xl font-bold tracking-tight text-sky-900">CampusShare</a>
            <nav class="hidden items-center space-x-8 md:flex font-['Manrope'] font-semibold">
                <a href="/pages/market_overview.html" data-nav-target="/pages/market_overview.html" class="text-slate-600 hover:text-sky-800">交易市场</a>
                <a href="/pages/market_listing.html?view=MATERIAL" data-nav-target="/pages/market_listing.html?view=MATERIAL" class="text-slate-600 hover:text-sky-800">学术资源</a>
                <a href="/pages/market_listing.html?view=FORUM" data-nav-target="/pages/market_listing.html?view=FORUM" class="text-slate-600 hover:text-sky-800">校园论坛</a>
                <a href="/pages/my_publish.html" data-nav-target="/pages/my_publish.html" class="text-slate-600 hover:text-sky-800">我的发布</a>
            </nav>
        </div>
        <div class="flex items-center space-x-4">
            <button class="relative rounded-full p-2 text-slate-600 hover:bg-slate-200/60" type="button" aria-label="消息通知">
                <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
            </button>
            <button class="rounded-full p-2 text-slate-600 hover:bg-slate-200/60" type="button" aria-label="个人中心">
                <span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
            </button>
        </div>
    </div>
</header>

<div class="flex">
    <aside class="fixed left-0 h-screen w-64 bg-slate-50 px-4 py-6">
        <div class="mb-8 flex items-center gap-3 px-2">
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary-container text-white">
                <span class="material-symbols-outlined text-lg">person</span>
            </div>
            <div>
                <p class="text-sm font-bold text-on-surface">个人中心</p>
                <p class="text-[10px] text-slate-500">校园认证用户</p>
            </div>
        </div>
        <nav class="space-y-1">
            <a href="/pages/market_overview.html" data-nav-target="/pages/market_overview.html" class="flex items-center gap-3 rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100">
                <span class="material-symbols-outlined">home</span>主页
            </a>
            <a href="/pages/my_publish.html" data-nav-target="/pages/my_publish.html" class="flex items-center gap-3 rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100">
                <span class="material-symbols-outlined">list_alt</span>我的发布
            </a>
            <a href="/pages/order_center.html" data-nav-target="/pages/order_center.html" class="flex items-center gap-3 rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100">
                <span class="material-symbols-outlined">receipt_long</span>订单中心
            </a>
            <a href="/pages/recruitment_board.html" data-nav-target="/pages/recruitment_board.html" class="flex items-center gap-3 rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100">
                <span class="material-symbols-outlined">groups</span>组队招募
            </a>
            <a href="/pages/notification_center.html" data-nav-target="/pages/notification_center.html" class="flex items-center gap-3 rounded-lg bg-white px-3 py-2 font-bold text-sky-800">
                <span class="material-symbols-outlined">notifications</span>消息通知
            </a>
            <a href="/pages/user_profile.html" data-nav-target="/pages/user_profile.html" class="flex items-center gap-3 rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100">
                <span class="material-symbols-outlined">settings</span>个人设置
            </a>
            <a href="/pages/admin_dashboard.html" data-admin-only="true" data-nav-target="/pages/admin_dashboard.html" class="hidden flex items-center gap-3 rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100">
                <span class="material-symbols-outlined">admin_panel_settings</span>管理仪表盘
            </a>
        </nav>
        <div class="mt-6 border-t border-slate-200 pt-6">
            <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2 text-slate-500 hover:bg-slate-100">
                <span class="material-symbols-outlined">help_outline</span>帮助中心
            </a>
            <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2 text-slate-500 hover:bg-slate-100">
                <span class="material-symbols-outlined">logout</span>退出登录
            </a>
        </div>
    </aside>

    <main class="ml-64 min-h-screen flex-1 bg-surface-container-low p-8">
        <div class="mx-auto max-w-5xl">
            <div class="mb-8 flex items-end justify-between">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight text-on-surface">消息中心</h1>
                    <p class="mt-1 text-on-surface-variant">查看订单通知、审核结果、积分变动和系统提醒</p>
                </div>
                <button class="flex items-center gap-2 rounded-lg bg-surface-container-lowest px-4 py-2 text-sm font-semibold text-primary shadow-sm hover:bg-surface-bright" type="button">
                    <span class="material-symbols-outlined text-lg" data-icon="done_all">done_all</span>
                    全部标记为已读
                </button>
            </div>

            <div class="mb-6 flex items-center space-x-1 w-fit rounded-xl bg-surface-container p-1">
                <button class="rounded-lg bg-surface-container-lowest px-6 py-2 text-sm font-semibold text-primary shadow-sm" type="button">全部消息</button>
                <button class="px-6 py-2 text-sm font-medium text-on-surface-variant hover:text-primary" type="button">未读</button>
                <button class="px-6 py-2 text-sm font-medium text-on-surface-variant hover:text-primary" type="button">已读</button>
            </div>

            <div class="space-y-4">
                <div class="rounded-xl bg-surface-container-lowest p-8 text-center text-sm text-slate-500">正在加载消息...</div>
            </div>
        </div>
    </main>
</div>

<footer class="border-t border-slate-200 bg-slate-50 py-10">
    <div class="ml-64 flex flex-col items-center justify-between gap-4 px-12 md:flex-row">
        <div class="font-bold text-sky-900">CampusShare</div>
        <div class="text-xs tracking-wider text-slate-500">© 2026 CampusShare</div>
    </div>
</footer>

<script src="/pages/assets/js/campusshare-api.js"></script>
<script src="/pages/assets/js/notification-center.js"></script>
</body>
</html>
