<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CampusShare | 帖子预览</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#005d90",
                        surface: "#f8f9fa",
                        "surface-low": "#f3f4f5",
                        outline: "#bfc7d1"
                    },
                    boxShadow: {
                        soft: "0 12px 30px rgba(0, 63, 105, 0.08)"
                    }
                }
            }
        };
    </script>
    <style>
        body {
            font-family: Inter, sans-serif;
        }
        h1, h2, h3 {
            font-family: Manrope, sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="bg-surface text-slate-800 min-h-screen">
<main class="max-w-5xl mx-auto px-6 py-8">
    <header class="rounded-2xl bg-white ring-1 ring-outline/25 shadow-soft px-6 py-5 mb-6">
        <p class="text-xs font-semibold tracking-widest text-slate-500 uppercase">内容审核预览</p>
        <h1 class="text-3xl font-extrabold mt-2">帖子详情预览</h1>
        <p class="text-sm text-slate-500 mt-2">该页面用于审核场景展示单条帖子完整信息。</p>
    </header>

    <section class="rounded-2xl bg-white ring-1 ring-outline/25 shadow-soft p-6 space-y-5">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <div class="text-sm text-slate-500">
                帖子ID：
                <span class="font-semibold text-slate-700" data-role="preview-id">-</span>
            </div>
            <a class="inline-flex items-center gap-1 px-3 py-2 rounded-lg bg-primary text-white text-xs font-semibold hover:opacity-95 transition-opacity" data-role="open-board-link" href="/pages/recruitment_board.html" rel="noopener noreferrer" target="_blank">
                <span class="material-symbols-outlined !text-sm">open_in_new</span>
                在招募板打开
            </a>
        </div>

        <article class="rounded-xl bg-surface-low p-5 ring-1 ring-outline/20">
            <h2 class="text-2xl font-extrabold" data-role="event-name">加载中...</h2>
            <div class="mt-3 flex flex-wrap items-center gap-2 text-xs">
                <span class="px-2.5 py-1 rounded-full bg-white ring-1 ring-outline/30 font-semibold" data-role="status-text">-</span>
                <span class="px-2.5 py-1 rounded-full bg-white ring-1 ring-outline/30">方向：<span class="font-semibold" data-role="direction">-</span></span>
                <span class="px-2.5 py-1 rounded-full bg-white ring-1 ring-outline/30">发起人：<span class="font-semibold" data-role="publisher-name">-</span></span>
            </div>
        </article>

        <article class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="rounded-xl bg-surface-low p-4 ring-1 ring-outline/20">
                <p class="text-xs text-slate-500">招募人数</p>
                <p class="text-2xl font-extrabold mt-2"><span data-role="current-count">0</span>/<span data-role="member-limit">0</span></p>
            </div>
            <div class="rounded-xl bg-surface-low p-4 ring-1 ring-outline/20">
                <p class="text-xs text-slate-500">申请总数</p>
                <p class="text-2xl font-extrabold mt-2" data-role="application-count">0</p>
            </div>
            <div class="rounded-xl bg-surface-low p-4 ring-1 ring-outline/20">
                <p class="text-xs text-slate-500">截止时间</p>
                <p class="text-sm font-semibold mt-2" data-role="deadline">-</p>
            </div>
        </article>

        <article class="rounded-xl bg-surface-low p-5 ring-1 ring-outline/20">
            <h3 class="text-sm font-bold mb-2">技能要求</h3>
            <p class="text-sm leading-7 whitespace-pre-wrap" data-role="skill-requirement">-</p>
        </article>

        <article class="rounded-xl bg-surface-low p-5 ring-1 ring-outline/20">
            <h3 class="text-sm font-bold mb-2">完整字段 JSON</h3>
            <pre class="text-xs leading-6 whitespace-pre-wrap break-all text-slate-700 bg-white rounded-lg ring-1 ring-outline/20 p-4" data-role="raw-json">{}</pre>
        </article>
    </section>
</main>

<script src="/pages/assets/js/campusshare-api.js?v=20260422"></script>
<script src="/pages/assets/js/team-post-preview.js?v=20260422"></script>
</body>
</html>
