<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusShare - 个人资料</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            width: 1em;
            height: 1em;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
<header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur-sm">
    <div class="mx-auto flex h-16 w-full max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-6">
            <a class="text-2xl font-extrabold tracking-tight text-sky-800" href="/pages/market_overview.html" data-nav-target="/pages/market_overview.html">CampusShare</a>
            <nav class="hidden items-center gap-5 md:flex">
                <a class="text-sm font-semibold text-slate-600 hover:text-sky-700" href="/pages/market_overview.html" data-nav-target="/pages/market_overview.html">交易市场</a>
                <a class="text-sm font-semibold text-slate-600 hover:text-sky-700" href="/pages/material_listing.html" data-nav-target="/pages/material_listing.html">学术资源</a>
                <a class="text-sm font-semibold text-slate-600 hover:text-sky-700" href="/pages/recruitment_board.html" data-nav-target="/pages/recruitment_board.html">校园论坛</a>
                <a class="text-sm font-semibold text-slate-600 hover:text-sky-700" href="/pages/my_publish.html" data-nav-target="/pages/my_publish.html">我的发布</a>
            </nav>
        </div>
        <div class="flex items-center gap-3">
            <button class="rounded-lg border border-slate-200 p-2 text-slate-600 hover:bg-slate-100" type="button" aria-label="通知">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <a class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" href="/pages/market_overview.html" data-nav-target="/pages/market_overview.html">返回首页</a>
        </div>
    </div>
</header>

<main class="mx-auto w-full max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <div data-role="message-bar" class="mb-5 hidden rounded-lg border px-3 py-2 text-sm"></div>

    <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">个人资料设置</h1>
            <p class="mt-1 text-sm text-slate-500">查看并维护你的账号资料、积分和认证状态</p>
        </div>
        <div class="flex items-center gap-2">
            <a class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" href="/pages/order_center.html" data-nav-target="/pages/order_center.html">订单中心</a>
            <a class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" href="/pages/my_publish.html" data-nav-target="/pages/my_publish.html">我的发布</a>
            <button type="button" data-action="logout" class="rounded-lg border border-red-200 px-3 py-2 text-sm font-semibold text-red-600 hover:bg-red-50">退出登录</button>
        </div>
    </div>

    <div class="grid gap-6 lg:grid-cols-3">
        <section class="rounded-xl border border-slate-200 bg-white p-6 lg:col-span-2">
            <div class="flex flex-wrap items-start justify-between gap-4">
                <div class="flex items-center gap-4">
                    <div class="flex h-16 w-16 items-center justify-center rounded-xl bg-sky-100 text-2xl font-bold text-sky-700" data-role="avatar-initials">--</div>
                    <div>
                        <h2 class="text-2xl font-bold text-slate-900" data-role="display-name">加载中</h2>
                        <p class="text-sm text-slate-500">账号：<span data-role="account">-</span></p>
                        <p class="mt-1 text-xs text-slate-500">角色：<span data-role="role-text">-</span> · 状态：<span data-role="status-text">-</span></p>
                    </div>
                </div>
                <button type="button" data-action="open-edit" class="rounded-lg bg-sky-700 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-800">编辑资料</button>
            </div>

            <div class="mt-6 grid gap-4 sm:grid-cols-2">
                <div class="rounded-lg bg-slate-50 p-4">
                    <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">邮箱</p>
                    <p class="mt-2 text-sm text-slate-800" data-role="email">-</p>
                </div>
                <div class="rounded-lg bg-slate-50 p-4">
                    <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">手机号</p>
                    <p class="mt-2 text-sm text-slate-800" data-role="phone">-</p>
                </div>
                <div class="rounded-lg bg-slate-50 p-4">
                    <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">学院</p>
                    <p class="mt-2 text-sm text-slate-800" data-role="college">-</p>
                </div>
                <div class="rounded-lg bg-slate-50 p-4">
                    <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">年级</p>
                    <p class="mt-2 text-sm text-slate-800" data-role="grade">-</p>
                </div>
            </div>

            <p class="mt-4 text-xs text-slate-500">最近登录：<span data-role="last-login-time">-</span></p>
        </section>

        <section class="space-y-4">
            <div class="rounded-xl border border-slate-200 bg-white p-5">
                <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">当前积分</p>
                <p class="mt-3 text-4xl font-extrabold text-sky-700" data-role="point-balance">0</p>
            </div>
            <div class="rounded-xl border border-slate-200 bg-white p-5">
                <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">我的商品</p>
                <p class="mt-3 text-3xl font-bold text-slate-900" data-role="product-count">0</p>
            </div>
            <div class="rounded-xl border border-slate-200 bg-white p-5">
                <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">我的资料</p>
                <p class="mt-3 text-3xl font-bold text-slate-900" data-role="material-count">0</p>
            </div>
        </section>
    </div>

    <section class="mt-6 grid gap-6 lg:grid-cols-2">
        <div class="rounded-xl border border-slate-200 bg-white p-6">
            <h3 class="text-lg font-bold text-slate-900">卖家认证</h3>
            <p class="mt-2 text-sm text-slate-500" data-role="seller-verify-status">未发起认证申请</p>
            <button type="button" data-action="seller-verify" class="mt-4 rounded-lg border border-sky-200 bg-sky-50 px-4 py-2 text-sm font-semibold text-sky-700 hover:bg-sky-100">申请认证卖家</button>
        </div>
        <div class="rounded-xl border border-slate-200 bg-white p-6">
            <h3 class="text-lg font-bold text-slate-900">快捷入口</h3>
            <div class="mt-3 grid grid-cols-2 gap-2 text-sm">
                <a class="rounded-lg border border-slate-200 px-3 py-2 text-center text-slate-700 hover:bg-slate-100" href="/pages/market_overview.html" data-nav-target="/pages/market_overview.html">交易市场</a>
                <a class="rounded-lg border border-slate-200 px-3 py-2 text-center text-slate-700 hover:bg-slate-100" href="/pages/material_listing.html" data-nav-target="/pages/material_listing.html">学术资源</a>
                <a class="rounded-lg border border-slate-200 px-3 py-2 text-center text-slate-700 hover:bg-slate-100" href="/pages/notification_center.html" data-nav-target="/pages/notification_center.html">消息通知</a>
                <a class="rounded-lg border border-slate-200 px-3 py-2 text-center text-slate-700 hover:bg-slate-100" href="/pages/order_center.html" data-nav-target="/pages/order_center.html">订单中心</a>
            </div>
        </div>
    </section>

    <section class="mt-6 rounded-xl border border-slate-200 bg-white p-6">
        <h3 class="text-lg font-bold text-slate-900">积分流水</h3>
        <div data-role="ledger-list" class="mt-4 space-y-3">
            <div class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-500">正在加载积分流水...</div>
        </div>
    </section>
</main>

<div data-role="profile-edit-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div data-role="modal-overlay" class="absolute inset-0 bg-slate-900/45"></div>
    <div class="relative w-full max-w-lg rounded-xl bg-white shadow-2xl">
        <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
            <h3 class="text-xl font-bold text-slate-900">编辑资料</h3>
            <button type="button" data-action="close-edit" class="rounded-lg p-1 text-slate-500 hover:bg-slate-100">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form data-role="profile-edit-form" class="space-y-4 px-6 py-5">
            <div>
                <label class="mb-1 block text-xs font-semibold tracking-wide text-slate-500">昵称</label>
                <input data-field="displayName" type="text" maxlength="20" class="w-full rounded-lg border-slate-300 text-sm focus:border-sky-500 focus:ring-sky-500" placeholder="请输入昵称" />
            </div>
            <div class="grid gap-4 sm:grid-cols-2">
                <div>
                    <label class="mb-1 block text-xs font-semibold tracking-wide text-slate-500">学院</label>
                    <input data-field="college" type="text" maxlength="50" class="w-full rounded-lg border-slate-300 text-sm focus:border-sky-500 focus:ring-sky-500" placeholder="请输入学院" />
                </div>
                <div>
                    <label class="mb-1 block text-xs font-semibold tracking-wide text-slate-500">年级</label>
                    <input data-field="grade" type="text" maxlength="20" class="w-full rounded-lg border-slate-300 text-sm focus:border-sky-500 focus:ring-sky-500" placeholder="请输入年级" />
                </div>
            </div>
            <div class="grid gap-4 sm:grid-cols-2">
                <div>
                    <label class="mb-1 block text-xs font-semibold tracking-wide text-slate-500">手机号</label>
                    <input data-field="phone" type="text" maxlength="30" class="w-full rounded-lg border-slate-300 text-sm focus:border-sky-500 focus:ring-sky-500" placeholder="选填" />
                </div>
                <div>
                    <label class="mb-1 block text-xs font-semibold tracking-wide text-slate-500">邮箱</label>
                    <input data-field="email" type="email" maxlength="100" class="w-full rounded-lg border-slate-300 text-sm focus:border-sky-500 focus:ring-sky-500" placeholder="选填" />
                </div>
            </div>
            <div class="flex justify-end gap-2 border-t border-slate-200 pt-4">
                <button type="button" data-action="cancel-edit" class="rounded-lg border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">取消</button>
                <button type="submit" class="rounded-lg bg-sky-700 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-800">保存</button>
            </div>
        </form>
    </div>
</div>

<footer class="mt-10 border-t border-slate-200 bg-white px-6 py-6 text-center text-sm text-slate-500">
    © 2026 CampusShare
</footer>

<script src="/pages/assets/js/campusshare-api.js"></script>
<script src="/pages/assets/js/user-profile.js"></script>
</body>
</html>
