<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CampusShare 用户工作台</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#005d90",
                    "primary-container": "#0077b6",
                    "on-primary": "#ffffff",
                    "surface": "#f8f9fa",
                    "surface-container": "#edeeef",
                    "surface-container-low": "#f3f4f5",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#707881",
                    "outline-variant": "#bfc7d1",
                    "on-surface": "#191c1d",
                    "on-surface-variant": "#404850",
                    error: "#ba1a1a"
                },
                borderRadius: {
                    DEFAULT: "0.125rem",
                    lg: "0.25rem",
                    xl: "0.5rem",
                    full: "0.75rem"
                },
                fontFamily: {
                    headline: ["Manrope"],
                    body: ["Inter"],
                    label: ["Inter"]
                }
            }
        }
    };
</script>
<style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.25rem;
        min-width: 1.25rem;
        overflow: hidden;
        font-size: 1.25rem;
        line-height: 1;
    }
    [data-workspace-nav][aria-current="page"] {
        background: #ffffff;
        color: #075985;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
        font-weight: 800;
    }
    aside button[data-workspace-nav]:not([data-workspace-target="/pages/notification_center.html"]),
    aside button[data-workspace-admin],
    aside button[data-workspace-help],
    aside button[data-workspace-logout] {
        border-radius: 0.5rem;
        line-height: 1.25rem;
        transition: background-color 0.15s ease, color 0.15s ease;
    }
    aside button[data-workspace-nav]:not([data-workspace-target="/pages/notification_center.html"]):hover,
    aside button[data-workspace-admin]:hover,
    aside button[data-workspace-help]:hover {
        background-color: rgba(148, 163, 184, 0.16);
    }
    [data-workspace-top-nav][aria-current="page"] {
        color: #075985;
        border-bottom-color: #075985;
    }
</style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
<header class="fixed left-0 right-0 top-0 z-50 h-16 border-b border-slate-200 bg-slate-50">
    <div class="flex h-16 items-center justify-between px-8">
        <button type="button" class="text-xl font-bold tracking-tight text-sky-900" data-workspace-brand>CampusShare</button>
        <nav class="flex items-center gap-6 font-['Manrope'] text-sm font-bold">
            <button type="button" class="border-b-2 border-transparent py-1 text-slate-600 hover:text-sky-800" data-workspace-top-nav data-workspace-target="/pages/market_listing.html">交易市场</button>
            <button type="button" class="border-b-2 border-transparent py-1 text-slate-600 hover:text-sky-800" data-workspace-top-nav data-workspace-target="/pages/market_listing.html?view=MATERIAL">学术资源</button>
            <button type="button" class="border-b-2 border-transparent py-1 text-slate-600 hover:text-sky-800" data-workspace-top-nav data-workspace-target="/pages/market_listing.html?view=FORUM">校园论坛</button>
        </nav>
    </div>
</header>

<aside class="fixed left-0 top-16 z-40 flex h-[calc(100vh-4rem)] w-64 flex-col border-r border-slate-200 bg-slate-50 px-4 py-6">
    <div class="mb-8 flex items-center gap-3 px-2">
        <div class="flex h-10 w-10 shrink-0 items-center justify-center overflow-hidden rounded-full bg-sky-100 text-sm font-bold text-sky-800" data-role="workspace-avatar">--</div>
        <div class="min-w-0">
            <p class="truncate text-sm font-bold text-slate-900" data-role="workspace-display-name">个人中心</p>
            <p class="truncate text-[10px] text-slate-500" data-role="workspace-role">校园认证用户</p>
        </div>
    </div>
    <nav class="flex flex-1 flex-col gap-1">
        <button type="button" class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 hover:text-sky-800" data-workspace-nav data-workspace-target="/pages/market_overview.html">
            <span class="material-symbols-outlined">home</span><span>主页</span>
        </button>
        <button type="button" class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 hover:text-sky-800" data-workspace-nav data-workspace-target="/pages/my_publish.html">
            <span class="material-symbols-outlined">list_alt</span><span>我的发布</span>
        </button>
        <button type="button" class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 hover:text-sky-800" data-workspace-nav data-workspace-target="/pages/order_center.html">
            <span class="material-symbols-outlined">receipt_long</span><span>订单中心</span>
        </button>
        <button type="button" class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 hover:text-sky-800" data-workspace-nav data-workspace-target="/pages/recruitment_board.html">
            <span class="material-symbols-outlined">groups</span><span>组队招募</span>
        </button>
        <button type="button" class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 hover:text-sky-800" data-workspace-nav data-workspace-target="/pages/notification_center.html">
            <span class="material-symbols-outlined">notifications</span><span>消息通知</span>
        </button>
        <button type="button" class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 hover:text-sky-800" data-workspace-nav data-workspace-target="/pages/user_profile.html">
            <span class="material-symbols-outlined">settings</span><span>个人设置</span>
        </button>
        <button type="button" class="hidden w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 hover:text-sky-800" data-admin-only="true" data-workspace-admin>
            <span class="material-symbols-outlined">admin_panel_settings</span><span>管理仪表盘</span>
        </button>
    </nav>
    <div class="mt-auto flex flex-col gap-1 border-t border-slate-200 pt-4">
        <button type="button" class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-slate-500 hover:bg-slate-100 hover:text-sky-800" data-workspace-help>
            <span class="material-symbols-outlined">help_outline</span><span>帮助中心</span>
        </button>
        <button type="button" class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-red-600 hover:bg-red-50" data-workspace-logout>
            <span class="material-symbols-outlined">logout</span><span>退出登录</span>
        </button>
    </div>
</aside>

<main class="ml-64 pt-16">
    <iframe class="block h-[calc(100vh-4rem)] w-full border-0 bg-slate-50" data-workspace-frame title="CampusShare 子界面"></iframe>
</main>

<script src="/pages/assets/js/campusshare-api.js?v=20260425-avatar-shell"></script>
<script src="/pages/assets/js/user-workspace.js?v=20260425-avatar-shell"></script>
</body>
</html>
