spring.datasource.url=jdbc:h2:mem:campusshare;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

spring.sql.init.mode=never
spring.mail.host=
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.main.allow-bean-definition-overriding=true
spring.task.scheduling.enabled=false

campusshare.mail.dispatch.enabled=false
campusshare.mail.dispatch.scheduler.enabled=false
campusshare.order.scheduler.enabled=false
campusshare.order.scheduler.fixed-delay-ms=600000
campusshare.rule.bootstrap.enabled=false
